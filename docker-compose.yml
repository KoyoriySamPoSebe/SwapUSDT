services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neighbours2290}
      POSTGRES_DB: ${POSTGRES_DB:-demodb}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demouser} -d ${POSTGRES_DB:-demodb}"]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - ./backend_proces/.services/configs/redis.conf:/redis.conf
    command: ["redis-server", "/redis.conf", "--appendonly", "yes", "--replica-read-only", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  back:
    build: ./backend_proces
    restart: always
    env_file:
      - ./backend_proces/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
      python manage.py makemigrations
      && python manage.py migrate
      && python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./backend_proces:/app
      - media_data:/app/media

  celery_worker:
    build: ./backend_proces
    restart: always
    env_file:
      - ./backend_proces/.env
    command: celery -A config worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_proces:/app
      - media_data:/app/media

  celery_beat:
    build: ./backend_proces
    restart: always
    env_file:
      - ./backend_proces/.env
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_proces:/app

  # Production: nginx + собранный фронт, API проксируется на back
  frontend:
    profiles: [prod]
    build:
      context: ./frontend_proces
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - media_data:/var/www/media:ro
    depends_on:
      - back

  # Development: Vite dev server с hot reload
  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend_proces
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8001/api
    volumes:
      - ./frontend_proces:/app
      - /app/node_modules
    depends_on:
      - back

volumes:
  postgres_data:
  media_data:
